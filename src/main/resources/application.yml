server:
  port: 8080

spring:
  application:
    name: starrocks-backup-service

  # 源集群配置（备份来源）
  datasource:
    source:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://source-starrocks-host:9030/default_cluster?useSSL=false&characterEncoding=UTF-8
      username: root
      password: 
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 60000

    # 目标集群配置（恢复目标）
    target:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://target-starrocks-host:9030/default_cluster?useSSL=false&characterEncoding=UTF-8
      username: root
      password: 
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 60000

# 日志配置
logging:
  level:
    com.starrocks.backup: DEBUG
    org.springframework.jdbc: DEBUG
